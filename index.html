<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Mi Plan de Salud</title>
<style>
:root{
  --bg:#0f1a14;--bg2:#162010;--card:#1c2a1e;--card2:#223026;
  --border:rgba(255,255,255,0.07);
  --green:#4ade80;--green-dim:rgba(74,222,128,0.12);--green-b:rgba(74,222,128,0.25);
  --amber:#fbbf24;--amber-dim:rgba(251,191,36,0.12);
  --coral:#f87171;--coral-dim:rgba(248,113,113,0.12);--coral-b:rgba(248,113,113,0.25);
  --blue:#60a5fa;--blue-dim:rgba(96,165,250,0.12);
  --purple:#a78bfa;--purple-dim:rgba(167,139,250,0.12);--purple-b:rgba(167,139,250,0.25);
  --text:#e8f5e2;--text2:#9cb898;--text3:#5a7a56;
  --r:14px;--rsm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Georgia',serif;}
body{display:flex;flex-direction:column;max-width:480px;margin:0 auto;overflow:hidden;}
.topbar{padding:14px 20px 10px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;}
.topbar h1{font-size:18px;font-weight:normal;color:var(--green);}
.topbar p{font-size:11px;color:var(--text3);font-family:monospace;margin-top:2px;}
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:80px;}
.section{display:none;padding:16px;}
.section.active{display:block;}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:100;}
.nav-btn{flex:1;padding:10px 4px 12px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:transparent;color:var(--text3);font-size:9px;font-family:monospace;text-transform:uppercase;letter-spacing:.08em;transition:color .15s;}
.nav-btn.active{color:var(--green);}
.nav-btn svg{width:20px;height:20px;}
h2{font-size:12px;font-family:monospace;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:12px;}
.tag{display:inline-block;font-size:10px;font-family:monospace;padding:2px 7px;border-radius:20px;}
.tg{background:var(--green-dim);color:var(--green);}
.ta{background:var(--amber-dim);color:var(--amber);}
.tb{background:var(--blue-dim);color:var(--blue);}
.tp{background:var(--purple-dim);color:var(--purple);}
.tc{background:var(--coral-dim);color:var(--coral);}
.nv1,.nv2{background:var(--green-dim);color:var(--green);}
.nv3,.nv4{background:var(--amber-dim);color:var(--amber);}
.nv5,.nv6{background:var(--purple-dim);color:var(--purple);}
.nv7,.nv8{background:var(--coral-dim);color:var(--coral);}
.tip{padding:10px 13px;background:var(--green-dim);border-radius:var(--rsm);font-size:12px;color:var(--green);border:1px solid var(--green-b);line-height:1.5;margin-top:10px;}
.exbox{padding:10px 13px;background:var(--purple-dim);border-radius:var(--rsm);font-size:12px;color:var(--purple);border:1px solid var(--purple-b);margin-top:8px;line-height:1.5;}
.exbox-lbl{font-size:10px;font-family:monospace;text-transform:uppercase;letter-spacing:.07em;opacity:.7;display:block;margin-bottom:2px;}
.hint{font-size:10px;color:var(--text3);font-family:monospace;text-align:center;margin-top:10px;}
.tab-row{display:flex;gap:5px;overflow-x:auto;padding-bottom:8px;margin-bottom:14px;scrollbar-width:none;}
.tab-row::-webkit-scrollbar{display:none;}
.dtab{flex-shrink:0;padding:6px 13px;font-size:12px;font-family:monospace;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s;}
.dtab.on{background:var(--green-dim);border-color:var(--green);color:var(--green);}
.kbar{display:flex;justify-content:space-between;align-items:center;background:var(--card2);border-radius:var(--rsm);padding:12px 14px;margin-bottom:12px;}
.knum{font-family:monospace;font-size:26px;color:var(--green);}
.klbl{font-size:10px;color:var(--text3);font-family:monospace;text-transform:uppercase;letter-spacing:.06em;}
.kdef{font-size:13px;font-family:monospace;color:var(--amber);}
.mc{background:var(--card2);border-radius:var(--rsm);margin-bottom:8px;border:1px solid transparent;overflow:hidden;}
.mc.on{border-color:var(--green-b);}
.mc-top{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 13px;cursor:pointer;}
.mc-info{flex:1;}
.mc-lbl{font-size:10px;font-family:monospace;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:3px;display:flex;gap:5px;align-items:center;}
.mc-name{font-size:13px;color:var(--text);line-height:1.35;}
.mc-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.mc-kcal{font-size:12px;font-family:monospace;color:var(--amber);margin-top:5px;}
.mc-chev{font-size:14px;color:var(--text3);transition:transform .2s;flex-shrink:0;margin-top:2px;margin-left:8px;}
.mc.on .mc-chev{transform:rotate(180deg);}
.mc-panel{display:none;border-top:1px solid var(--border);}
.mc.on .mc-panel{display:block;}
.ptabs{display:flex;gap:5px;padding:10px 13px 0;}
.ptab{font-size:11px;font-family:monospace;padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s;}
.ptab.on{background:var(--green-dim);border-color:var(--green);color:var(--green);}
.pbody{padding:12px 13px 13px;}
.rlbl{font-size:10px;font-family:monospace;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:5px;}
.ringr{font-size:12px;color:var(--text2);line-height:1.8;margin-bottom:12px;}
.rsteps{font-size:12px;color:var(--text2);line-height:1.7;padding-left:17px;}
.arow{display:flex;justify-content:space-between;align-items:center;background:var(--card);border-radius:var(--rsm);padding:11px 13px;margin-bottom:7px;cursor:pointer;border:1px solid var(--border);}
.arow:active{border-color:var(--green);}
.aname{font-size:13px;color:var(--text);line-height:1.3;}
.asub{font-size:11px;color:var(--text3);margin-top:2px;}
.akcal{font-size:14px;font-family:monospace;color:var(--amber);flex-shrink:0;margin-left:10px;}
.sw{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:14px;}
.sw-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.sw-l{flex:1;}
.sv{font-family:monospace;font-size:38px;color:var(--amber);line-height:1;}
.slbl{font-size:10px;font-family:monospace;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-top:3px;}
.spbar{height:5px;background:var(--border);border-radius:3px;margin:10px 0 5px;}
.spfill{height:5px;border-radius:3px;background:var(--amber);transition:width .3s;}
.spct{font-size:11px;font-family:monospace;color:var(--text3);}
.sw-r{display:flex;flex-direction:column;gap:6px;}
.sbtn{padding:7px 13px;font-size:12px;font-family:monospace;border-radius:var(--rsm);border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap;}
.sbtn.add{border-color:var(--green-b);color:var(--green);}
.sbtn.rst{color:var(--text3);font-size:11px;}
.snote{font-size:11px;color:var(--text3);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.wtab{flex-shrink:0;padding:5px 11px;font-size:11px;font-family:monospace;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;}
.wtab.on{background:var(--purple-dim);border-color:var(--purple);color:var(--purple);}
.wcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;}
.whead{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.wtitle{font-size:15px;color:var(--text);}
.wpbar{height:3px;background:var(--border);border-radius:2px;margin:8px 0 12px;}
.wpfill{height:3px;border-radius:2px;background:var(--purple);}
.wdesc{font-size:12px;color:var(--text2);line-height:1.55;margin-bottom:14px;}
.edc{background:var(--card2);border-radius:var(--rsm);margin-bottom:7px;border:1px solid transparent;overflow:hidden;}
.edc.on{border-color:var(--purple-b);}
.edc.rest{opacity:.6;}
.edc-top{display:flex;justify-content:space-between;align-items:flex-start;padding:11px 13px;cursor:pointer;}
.edc-lbl{font-size:10px;font-family:monospace;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:3px;}
.edc-name{font-size:13px;color:var(--text);}
.edc-sub{font-size:11px;color:var(--text2);margin-top:3px;line-height:1.4;}
.edc-chev{font-size:14px;color:var(--text3);transition:transform .2s;flex-shrink:0;margin-left:8px;}
.edc.on .edc-chev{transform:rotate(180deg);}
.edc-body{display:none;border-top:1px solid var(--border);padding:12px 13px 13px;}
.edc.on .edc-body{display:block;}
.exitem{background:var(--bg2);border-radius:var(--rsm);padding:10px 12px;margin-bottom:7px;}
.exitem:last-child{margin-bottom:0;}
.exitem-n{font-size:13px;color:var(--green);margin-bottom:4px;}
.exitem-h{font-size:12px;color:var(--text2);line-height:1.55;}
.exitem-t{font-size:11px;color:var(--amber);margin-top:4px;font-style:italic;}
.ytlinks{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px;}
.ytbtn{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-family:monospace;padding:6px 12px;border-radius:var(--rsm);background:var(--coral-dim);color:var(--coral);text-decoration:none;border:1px solid var(--coral-b);}
.sbox{width:100%;padding:10px 14px;font-size:13px;background:var(--card);border:1px solid var(--border);border-radius:var(--rsm);color:var(--text);font-family:'Georgia',serif;margin-bottom:12px;outline:none;}
.sbox::placeholder{color:var(--text3);}
.sbox:focus{border-color:var(--green);}
.fpill{flex-shrink:0;padding:5px 12px;font-size:11px;font-family:monospace;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;}
.fpill.on{background:var(--green-dim);border-color:var(--green);color:var(--green);}
.rcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;cursor:pointer;}
.rcard.on{border-color:var(--green);}
.rh{display:flex;justify-content:space-between;align-items:flex-start;}
.rn{font-size:14px;color:var(--text);line-height:1.3;}
.ra{color:var(--text3);font-size:16px;transition:transform .2s;flex-shrink:0;margin-left:8px;}
.rcard.on .ra{transform:rotate(180deg);}
.rt{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap;}
.rb{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.rcard.on .rb{display:block;}
.rbl{font-size:10px;font-family:monospace;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin:0 0 5px;}
.ri{font-size:12px;color:var(--text2);line-height:1.8;margin-bottom:12px;}
.rs{font-size:12px;color:var(--text2);line-height:1.7;padding-left:17px;margin-bottom:12px;}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.scard{background:var(--card2);border-radius:var(--rsm);padding:12px;}
.sval{font-family:monospace;font-size:20px;color:var(--amber);}
.slb{font-size:10px;color:var(--text3);font-family:monospace;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;}
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{font-family:monospace;font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);}
td{padding:9px 10px;border-bottom:1px solid var(--border);color:var(--text2);}
td:first-child{color:var(--text);}
td.hl{color:var(--amber);font-family:monospace;}
.empty{text-align:center;padding:2rem;color:var(--text3);font-size:13px;}

/* CHECKMARK días */
.dtab{position:relative;}
.dtab .chk{position:absolute;top:-5px;right:-5px;width:14px;height:14px;background:var(--green);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:8px;color:#0f1a14;font-weight:bold;}
.dtab.done .chk{display:flex;}
/* BUSCADOR recetas */
.srec-box{width:100%;padding:10px 14px;font-size:13px;background:var(--card);border:1px solid var(--border);border-radius:var(--rsm);color:var(--text);font-family:Georgia,serif;margin-bottom:10px;outline:none;box-sizing:border-box;}
.srec-box:focus{border-color:var(--green);}
.srec-box::placeholder{color:var(--text3);}
/* PREP semanal */
.prep-box{background:var(--amber-dim);border:1px solid rgba(251,191,36,0.3);border-radius:var(--rsm);padding:11px 13px;font-size:12px;color:var(--amber);line-height:1.6;margin-bottom:14px;}
.prep-box b{display:block;font-size:10px;font-family:monospace;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;opacity:.8;}
/* semana badge */
.week-badge{font-size:10px;font-family:monospace;background:var(--blue-dim);color:var(--blue);padding:2px 8px;border-radius:20px;margin-left:6px;vertical-align:middle;}
/* storage warning */
.storage-warn{font-size:10px;font-family:monospace;color:var(--coral);text-align:center;padding:4px;margin-top:4px;}
</style>
</head>
<body>
<div class="topbar" style="display:flex;justify-content:space-between;align-items:flex-start;">
  <div>
    <h1>Mi Plan de Salud</h1>
    <p id="obj-display">Objetivo: 6–7 kg · 8 semanas</p>
  </div>
  <button onclick="openObjEdit()" style="background:transparent;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:0;margin-top:2px;">✎</button>
</div>
<!-- objetivo modal -->
<div id="obj-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:flex-end;justify-content:center;">
  <div style="background:var(--bg2);border-radius:14px 14px 0 0;width:100%;max-width:480px;padding:20px 16px 32px;border-top:1px solid var(--border);max-height:90vh;overflow-y:auto;">
    <p style="font-size:12px;font-family:monospace;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:14px;">Editar perfil y objetivo</p>
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px;">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div>
          <label style="font-size:11px;color:var(--text3);font-family:monospace;display:block;margin-bottom:4px;">Sexo</label>
          <select id="obj-sex" style="width:100%;padding:9px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:Georgia,serif;">
            <option value="f">Mujer</option>
            <option value="m">Hombre</option>
          </select>
        </div>
        <div>
          <label style="font-size:11px;color:var(--text3);font-family:monospace;display:block;margin-bottom:4px;">Edad (años)</label>
          <input id="obj-age" type="number" min="15" max="80" value="30" style="width:100%;padding:9px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:Georgia,serif;">
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div>
          <label style="font-size:11px;color:var(--text3);font-family:monospace;display:block;margin-bottom:4px;">Peso actual (kg)</label>
          <input id="obj-weight" type="number" min="40" max="200" value="75" style="width:100%;padding:9px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:Georgia,serif;">
        </div>
        <div>
          <label style="font-size:11px;color:var(--text3);font-family:monospace;display:block;margin-bottom:4px;">Altura (cm)</label>
          <input id="obj-height" type="number" min="140" max="220" value="170" style="width:100%;padding:9px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:Georgia,serif;">
        </div>
      </div>
      <div>
        <label style="font-size:11px;color:var(--text3);font-family:monospace;display:block;margin-bottom:4px;">Nivel de actividad</label>
        <select id="obj-activity" style="width:100%;padding:9px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:Georgia,serif;">
          <option value="1.2">Sedentario (trabajo de oficina, poco movimiento)</option>
          <option value="1.375" selected>Poco activo (caminata diaria, ejercicio leve)</option>
          <option value="1.55">Moderadamente activo (ejercicio 3-5 días/semana)</option>
          <option value="1.725">Muy activo (ejercicio intenso 6-7 días/semana)</option>
        </select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div>
          <label style="font-size:11px;color:var(--text3);font-family:monospace;display:block;margin-bottom:4px;">Kilos a perder</label>
          <input id="obj-kg" type="number" min="1" max="30" value="6" style="width:100%;padding:9px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:Georgia,serif;">
        </div>
        <div>
          <label style="font-size:11px;color:var(--text3);font-family:monospace;display:block;margin-bottom:4px;">Semanas</label>
          <input id="obj-weeks" type="number" min="1" max="52" value="8" style="width:100%;padding:9px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:Georgia,serif;">
        </div>
      </div>
      <div id="obj-preview" style="background:var(--card);border-radius:8px;padding:12px;font-size:12px;color:var(--text2);line-height:1.7;"></div>
      <div>
        <label style="font-size:11px;color:var(--text3);font-family:monospace;display:block;margin-bottom:8px;">Restricciones alimenticias</label>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;color:var(--text2);">
            <input type="checkbox" id="diet-vegan" style="width:16px;height:16px;accent-color:var(--green);cursor:pointer;">
            Vegano/a <span style="font-size:11px;color:var(--text3);">(sin carne, lácteos, huevos ni pescado)</span>
          </label>
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;color:var(--text2);">
            <input type="checkbox" id="diet-veg" style="width:16px;height:16px;accent-color:var(--green);cursor:pointer;">
            Vegetariano/a <span style="font-size:11px;color:var(--text3);">(sin carne ni pescado)</span>
          </label>
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;color:var(--text2);">
            <input type="checkbox" id="diet-pesc" style="width:16px;height:16px;accent-color:var(--green);cursor:pointer;">
            Pescetariano/a <span style="font-size:11px;color:var(--text3);">(sin carne, pero sí pescado)</span>
          </label>
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;color:var(--text2);">
            <input type="checkbox" id="diet-celiac" style="width:16px;height:16px;accent-color:var(--green);cursor:pointer;">
            Celíaco/a — Sin TACC <span style="font-size:11px;color:var(--text3);">(sin trigo, avena, cebada ni centeno)</span>
          </label>
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;color:var(--text2);">
            <input type="checkbox" id="diet-lactose" style="width:16px;height:16px;accent-color:var(--green);cursor:pointer;">
            Sin lactosa <span style="font-size:11px;color:var(--text3);">(sin lácteos)</span>
          </label>
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;color:var(--text2);">
            <input type="checkbox" id="diet-egg" style="width:16px;height:16px;accent-color:var(--green);cursor:pointer;">
            Sin huevo
          </label>
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;color:var(--text2);">
            <input type="checkbox" id="diet-peanut" style="width:16px;height:16px;accent-color:var(--green);cursor:pointer;">
            Sin maní <span style="font-size:11px;color:var(--text3);">(alergia o intolerancia)</span>
          </label>
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;color:var(--text2);">
            <input type="checkbox" id="diet-diabetes" style="width:16px;height:16px;accent-color:var(--green);cursor:pointer;">
            Diabetes <span style="font-size:11px;color:var(--text3);">(bajo índice glucémico)</span>
          </label>

<script>
// ── RECORRIDOS ──────────────────────────────
var recorridos=[];
function walkKcal(km,pace,weight){var met=pace<=4?3.5:pace<=5?3.8:4.5;var hours=km/pace;return Math.round(met*weight*hours);}
function totalRecKcal(){return recorridos.filter(function(r){return r.status==='done';}).reduce(function(a,r){return a+r.kcal;},0);}
function renderRecSummary(){
  if(!document.getElementById('rec-kcal-total'))return;
  var total=totalRecKcal();var weekNeed=neededDeficit()*7;var pct=weekNeed>0?Math.min(100,Math.round(total/weekNeed*100)):0;document.getElementById('rec-kcal-total').innerHTML=total.toLocaleString('es')+' <span style="font-size:14px;color:var(--text3)">kcal</span>';document.getElementById('rec-deficit-pct').textContent=pct+'%';document.getElementById('rec-deficit-pct').style.color=pct>=50?'var(--green)':'var(--amber)';document.getElementById('rec-bar').style.width=pct+'%';document.getElementById('rec-bar-label').textContent='Cubrís el '+pct+'% del déficit semanal con tus recorridos.';
}
function renderRecList(){
  var el=document.getElementById('rec-list-el');
  if(!el)return;el.innerHTML=recorridos.slice().reverse().map(function(r,i){var ri=recorridos.length-1-i;var statusBadge=r.status==='done'?'<span style="font-size:10px;font-family:monospace;background:var(--green-dim);color:var(--green);padding:2px 7px;border-radius:20px;">'+r.km.toFixed(1)+' km · '+r.kcal+' kcal</span>':r.status==='error'?'<span style="font-size:10px;font-family:monospace;background:var(--coral-dim);color:var(--coral);padding:2px 7px;border-radius:20px;">⚠ '+(r.errorMsg||'Error')+'</span>':'<span style="font-size:10px;font-family:monospace;background:var(--amber-dim);color:var(--amber);padding:2px 7px;border-radius:20px;">⏳ pendiente</span>';var typeLabel=r.type===2?'Ida y vuelta':'Solo ida';var paceLabel=r.pace<=4?'Tranquilo':r.pace<=5?'Normal':'Rápido';return'<div style="background:var(--card2);border-radius:var(--rsm);padding:12px 13px;margin-bottom:8px;border:1px solid var(--border);"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;"><div style="flex:1;"><div style="font-size:13px;color:var(--text);line-height:1.4;">'+r.from+' → '+r.to+'</div><div style="font-size:11px;color:var(--text3);margin-top:3px;">'+typeLabel+' · '+paceLabel+' · '+r.date+'</div></div><button onclick="deleteRec('+ri+')" style="background:transparent;border:none;color:var(--text3);font-size:16px;cursor:pointer;flex-shrink:0;padding:0;">✕</button></div><div style="margin-top:7px;">'+statusBadge+'</div></div>';}).join('');}
function deleteRec(i){recorridos.splice(i,1);renderRecList();renderRecSummary();rPlan();storeSave();}
async function resolveDistance(r){
  try{
    // Geocodificación con bias a Montevideo y restricción a Uruguay
    var MVDLAT=-34.9011,MVDLON=-56.1645;
    var baseParams='&format=json&limit=1&countrycodes=uy&viewbox=-58.5,-35.0,-53.0,-30.0&bounded=1';
    var ctx=', Montevideo, Uruguay';
    var fromRes=await fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(r.from+ctx)+baseParams);
    var fromData=await fromRes.json();
    if(!fromData.length)return {err:'No se encontró el origen "'+r.from+'"'};
    var toRes=await fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(r.to+ctx)+baseParams);
    var toData=await toRes.json();
    if(!toData.length)return {err:'No se encontró el destino "'+r.to+'"'};
    var fLat=parseFloat(fromData[0].lat),fLon=parseFloat(fromData[0].lon);
    var tLat=parseFloat(toData[0].lat),tLon=parseFloat(toData[0].lon);
    // Uruguay: lat -30 a -35, lon -53 a -58.5
    var inUY=function(la,lo){return la>=-35.1&&la<=-29.9&&lo>=-58.5&&lo<=-53.0;};
    if(!inUY(fLat,fLon))return {err:'No se ubicó el origen dentro de Uruguay'};
    if(!inUY(tLat,tLon))return {err:'No se ubicó el destino dentro de Uruguay'};
    var url='https://router.project-osrm.org/route/v1/foot/'+fLon+','+fLat+';'+tLon+','+tLat+'?overview=false';
    var routeRes=await fetch(url);
    var routeData=await routeRes.json();
    if(!routeData.routes||!routeData.routes.length)return {err:'No se pudo calcular la ruta'};
    var km=routeData.routes[0].distance/1000; // OSRM devuelve metros
    if(km>30)return {err:'La distancia calculada ('+km.toFixed(1)+' km) parece incorrecta. Revisá las direcciones.'};
    return {km:km};
  }catch(e){return {err:'Error de conexión. El recorrido se guardó como pendiente.'};  }
}
async function addRecorrido(){var from=document.getElementById('rec-from').value.trim();var to=document.getElementById('rec-to').value.trim();var type=parseInt(document.getElementById('rec-type').value);var pace=parseFloat(document.getElementById('rec-pace').value);if(!from||!to){alert('Ingresá origen y destino.');return;}var now=new Date();var date=now.toLocaleDateString('es',{day:'2-digit',month:'2-digit',year:'numeric'});var r={id:Date.now(),from:from,to:to,type:type,pace:pace,km:0,kcal:0,status:'pending',date:date};recorridos.push(r);renderRecList();renderRecSummary();document.getElementById('rec-from').value='';document.getElementById('rec-to').value='';tryResolve(r);}
async function tryResolve(r){
  if(!navigator.onLine)return;
  var res=await resolveDistance(r);
  if(!res){r.status='error';r.errorMsg='No se pudo calcular la distancia.';renderRecList();return;}
  if(res.err){r.status='error';r.errorMsg=res.err;renderRecList();return;}
  var totalKm=res.km*r.type;
  r.km=Math.round(totalKm*10)/10;
  r.kcal=walkKcal(totalKm,r.pace,objWeight);
  r.status='done';
  renderRecList();renderRecSummary();rPlan();storeSave();
}

window.addEventListener('online',function(){recorridos.forEach(function(r){if(r.status==='pending')tryResolve(r);});});

// ── PROFILE ─────────────────────────────────
var objKg=6,objWeeks=8,objSex='f',objAge=30,objWeight=75,objHeight=170,objActivity=1.375;
function calcBMR(){if(objSex==='m')return Math.round(10*objWeight+6.25*objHeight-5*objAge+5);return Math.round(10*objWeight+6.25*objHeight-5*objAge-161);}
function calcTDEE(){return Math.round(calcBMR()*objActivity);}
function calcBMI(){return(objWeight/(objHeight/100*objHeight/100)).toFixed(1);}
function bmiCategory(bmi){if(bmi<18.5)return'Bajo peso';if(bmi<25)return'Peso normal';if(bmi<30)return'Sobrepeso';return'Obesidad';}
function neededDeficit(){var raw=Math.round(objKg*7700/(objWeeks*7));var walkDaily=Math.round(totalRecKcal()/7);var net=Math.max(0,raw-walkDaily);return Math.min(1000,Math.max(500,net));}
function dailyTarget(){return Math.max(1200,calcTDEE()-neededDeficit());}
function updatePreview(){
  // Lee SOLO del form, sin modificar los globals (evita estado sucio si se cancela)
  var sex=document.getElementById('obj-sex').value;
  var age=parseInt(document.getElementById('obj-age').value)||30;
  var weight=parseFloat(document.getElementById('obj-weight').value)||75;
  var height=parseFloat(document.getElementById('obj-height').value)||170;
  var activity=parseFloat(document.getElementById('obj-activity').value)||1.375;
  var kg=parseInt(document.getElementById('obj-kg').value)||6;
  var weeks=parseInt(document.getElementById('obj-weeks').value)||8;
  var bmr=sex==='m'?Math.round(10*weight+6.25*height-5*age+5):Math.round(10*weight+6.25*height-5*age-161);
  var tdee=Math.round(bmr*activity);
  var bmi=(weight/(height/100*height/100)).toFixed(1);
  var cat=bmiCategory(parseFloat(bmi));
  var rawDef=Math.round(kg*7700/(weeks*7));
  var def=Math.min(1000,Math.max(500,rawDef));
  var target=Math.max(1200,tdee-def);
  var capped=rawDef!==def;
  var warn=capped?'<br><span style="color:var(--amber)">⚠ Déficit ajustado al rango seguro (500–1.000 kcal/día)</span>':'';
  document.getElementById('obj-preview').innerHTML='<b style="color:var(--text)">IMC: '+bmi+'</b> · '+cat+'<br>Mantenimiento (TDEE): '+tdee+' kcal/día<br>Déficit diario necesario: −'+def+' kcal<br><b style="color:var(--green)">Objetivo calórico: '+target+' kcal/día</b>'+warn;
}

  return true;
}

var PS=BASE.map(function(d){return{name:d.name,exercise:d.exercise,exLabel:d.exLabel,tip:d.tip,meals:d.meals.map(function(m){return Object.assign({},m);})};});
var curD=0,mO={},mT={};
function rDTabs(){
  document.getElementById('dtabs').innerHTML=BASE.map(function(d,i){
    var done=!!daysDone[dayKey(i)];
    return '<button class="dtab '+(i===curD?'on':'')+(done?' done':'')+'" onclick="selD('+i+')">'
      +d.name+'<span class="chk" onclick="toggleDone('+i+',event)">✓</span></button>';
  }).join('');
}
function selD(i){curD=i;rDTabs();rPlan();}
function rPlan(){
  var d=PS[curD];
  var tot=d.meals.reduce(function(a,m){return a+m.kcal;},0);
  var target=dailyTarget();
  var pct=Math.min(100,Math.round(tot/target*100));
  var tdee=calcTDEE();
  var weekTotal=PS.reduce(function(a,day){return a+day.meals.reduce(function(b,m){return b+m.kcal;},0);},0);
  var weeklyDeficitReal=(tdee*7)-weekTotal;
  var kgOnTrack=weeklyDeficitReal/7700;
  var weekTarget=target*7;
  var weekPct=Math.min(100,Math.round(weekTotal/weekTarget*100));
  var barColor=pct<=100?'var(--green)':'var(--coral)';
  var statusMsg=pct<85?'El plan de hoy está por debajo de la meta — podés agregar algo':pct<=100?'El plan del día está dentro de la meta calórica':'El plan del día supera la meta calórica';
  var statusColor=pct<85?'var(--amber)':pct<=100?'var(--green)':'var(--coral)';
  var weekMsg=kgOnTrack>0?'Con este plan perderías ~'+kgOnTrack.toFixed(2)+' kg esta semana':'Estás por encima del objetivo semanal';
  var h='<div style="background:var(--card2);border-radius:var(--rsm);padding:12px 14px;margin-bottom:12px;">';
  h+='<div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:8px;">';
  h+='<div><div style="font-size:10px;font-family:monospace;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);">Meta calórica del día</div>';
  h+='<div style="font-family:monospace;font-size:26px;color:var(--green);">'+target+' <span style="font-size:13px;color:var(--text3)">kcal</span></div>';
  h+='<div style="font-size:10px;color:var(--text3);margin-top:2px;">lo que deberías comer hoy</div></div>';
  h+='<div style="text-align:right;"><div style="font-size:10px;font-family:monospace;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);">Plan del día</div>';
  h+='<div style="font-family:monospace;font-size:20px;color:'+barColor+';">'+tot+' kcal</div>';
  h+='<div style="font-size:10px;color:var(--text3);margin-top:2px;">suma de las 4 comidas</div></div></div>';
  h+='<div style="height:6px;background:var(--border);border-radius:3px;margin-bottom:6px;"><div style="height:6px;border-radius:3px;background:'+barColor+';width:'+pct+'%;transition:width .4s;"></div></div>';
  h+='<div style="display:flex;justify-content:space-between;font-size:11px;">';
  h+='<span style="color:'+statusColor+';">'+statusMsg+'</span>';
  h+='<span style="font-family:monospace;color:var(--text3);">'+pct+'%</span></div>';
  h+='<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);">'+weekMsg+'</div>';
  h+='</div>';
  d.meals.forEach(function(m,mi){
    var k=curD+'-'+mi,open=!!mO[k],tab=mT[k]||'recipe',rec=REC[m.name];
    var alts=filteredPool(m.type).filter(function(o){return o.name!==m.name;});
    h+='<div class="mc '+(open?'on':'')+'" id="mc-'+k+'">';
    h+='<div class="mc-top" onclick="togM(\''+k+'\')">';
    h+='<div class="mc-info"><div class="mc-lbl">'+m.label+(m.protein?' <span class="tag tg" style="padding:1px 5px;font-size:9px;">proteína</span>':'')+(m.sweet?' <span class="tag ta" style="padding:1px 5px;font-size:9px;">dulce</span>':'')+'</div><div class="mc-name">'+m.name+'</div><div class="mc-sub">'+m.detail+'</div><div class="mc-kcal">'+m.kcal+' kcal</div></div>';
    h+='<div class="mc-chev">▾</div></div>';
    h+='<div class="mc-panel">';
    h+='<div class="ptabs"><button class="ptab '+(tab==='recipe'?'on':'')+'" onclick="setT(\''+k+'\',\'recipe\',event)">Receta</button><button class="ptab '+(tab==='swap'?'on':'')+'" onclick="setT(\''+k+'\',\'swap\',event)">Cambiar comida</button></div>';
    h+='<div class="pbody">';
    h+='<div style="display:'+(tab==='recipe'?'block':'none')+'">';
    if(rec){
      h+='<p class="rlbl">Ingredientes</p><p class="ringr">'+rec.i.replace(/\n/g,'<br>')+'</p>';
      h+='<p class="rlbl">Preparación</p><ol class="rsteps">'+rec.s.map(function(s){return'<li>'+s+'</li>';}).join('')+'</ol>';
    }else{h+='<p style="font-size:12px;color:var(--text3)">Receta no disponible.</p>';}
    h+='</div>';
    h+='<div style="display:'+(tab==='swap'?'block':'none')+'">';
    alts.forEach(function(o,oi){
      h+='<div class="arow" onclick="doSwap('+curD+','+mi+','+oi+',\''+m.name+'\',\''+m.type+'\')">';
      h+='<div><div class="aname">'+o.name+'</div><div class="asub">'+o.detail+(o.protein?' · proteína':'')+(o.sweet?' · dulce':'')+'</div></div>';
      h+='<div class="akcal">'+o.kcal+'</div></div>';
    });
    h+='</div>';
    h+='</div></div></div>';
  });
  h+='<div class="hint">Tocá cada comida para ver la receta o cambiarla</div>';
  document.getElementById('plan').innerHTML=h;
}
function togM(k){mO[k]=!mO[k];rPlan();setTimeout(function(){var el=document.getElementById('mc-'+k);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},60);}
function setT(k,tab,e){e.stopPropagation();mT[k]=tab;mO[k]=true;rPlan();}
function doSwap(di,mi,oi,cn,type){var alts=POOLS[type].filter(function(o){return o.name!==cn;});var ch=alts[oi],old=PS[di].meals[mi];PS[di].meals[mi]=Object.assign({},ch,{type:old.type,label:old.label});mT[di+'-'+mi]='recipe';rPlan();storeSave();}

function adjustMeals(){
  PS=BASE.map(function(d){return{name:d.name,exercise:d.exercise,exLabel:d.exLabel,tip:d.tip,meals:d.meals.map(function(m){return Object.assign({},m);})};});

  // PASO 0: reemplazar cualquier comida que no cumpla restricciones activas
  PS.forEach(function(day){
    day.meals.forEach(function(m,mi){
      if(!mealOk(m)){
        var pool=filteredPool(m.type);
        if(pool.length>0){
          var best=pool.reduce(function(a,b){return Math.abs(a.kcal-m.kcal)<=Math.abs(b.kcal-m.kcal)?a:b;});
          day.meals[mi]=Object.assign({},best,{type:m.type,label:m.label});
        }
      }
    });
  });

  // PASO 1: ajuste calórico por día — para cada día, acercar el total a dailyTarget()
  var target=dailyTarget();

  PS.forEach(function(day,di){
    // Iteramos hasta 20 veces por día hasta que el total esté dentro de ±100 kcal del objetivo
    for(var iter=0;iter<20;iter++){
      var dayTotal=day.meals.reduce(function(a,m){return a+m.kcal;},0);
      var gap=dayTotal-target;
      if(Math.abs(gap)<=100) break;
      var bestScore=0,bestMi=-1,bestAlt=null;
      day.meals.forEach(function(m,mi){
        // Use weekOffset to vary which alternatives are preferred each week
        var pool=filteredPool(m.type).filter(function(o){return o.name!==m.name;});
        var offset=weekOffset>0?(di*7+mi*3+weekOffset)%Math.max(1,pool.length):0;
        pool=pool.slice(offset).concat(pool.slice(0,offset));
        pool.forEach(function(alt){
          var newGap=dayTotal-m.kcal+alt.kcal-target;
          var improvement=Math.abs(gap)-Math.abs(newGap);
          if(improvement>bestScore){bestScore=improvement;bestMi=mi;bestAlt=alt;}
        });
      });
      if(bestMi===-1||bestScore<=0) break;
      var old=day.meals[bestMi];
      day.meals[bestMi]=Object.assign({},bestAlt,{type:old.type,label:old.label});
    }
  });

  mO={};mT={};
}

var STORE_KEY='mps_v1';
function storeSave(){
  try{
    var data={
      profile:{objKg:objKg,objWeeks:objWeeks,objSex:objSex,objAge:objAge,
               objWeight:objWeight,objHeight:objHeight,objActivity:objActivity},
      diets:{dietVegan:dietVegan,dietVegetarian:dietVegetarian,dietPesc:dietPesc,
             dietCeliac:dietCeliac,dietLactose:dietLactose,dietEgg:dietEgg,
             dietPeanut:dietPeanut,dietDiabetes:dietDiabetes,dietKeto:dietKeto},
      recorridos:recorridos,
      daysDone:daysDone,
      weekOffset:weekOffset
    };
    localStorage.setItem(STORE_KEY,JSON.stringify(data));
  }catch(e){}
}
function storeLoad(){
  try{
    var raw=localStorage.getItem(STORE_KEY);
    if(!raw)return false;
    var data=JSON.parse(raw);
    if(data.profile){
      objKg=data.profile.objKg||6;objWeeks=data.profile.objWeeks||8;
      objSex=data.profile.objSex||'f';objAge=data.profile.objAge||30;
      objWeight=data.profile.objWeight||75;objHeight=data.profile.objHeight||170;
      objActivity=data.profile.objActivity||1.375;
    }
    if(data.diets){
      dietVegan=!!data.diets.dietVegan;dietVegetarian=!!data.diets.dietVegetarian;
      dietPesc=!!data.diets.dietPesc;dietCeliac=!!data.diets.dietCeliac;
      dietLactose=!!data.diets.dietLactose;dietEgg=!!data.diets.dietEgg;
      dietPeanut=!!data.diets.dietPeanut;dietDiabetes=!!data.diets.dietDiabetes;
      dietKeto=!!data.diets.dietKeto;
    }
    if(data.recorridos) recorridos=data.recorridos;
    if(data.daysDone) daysDone=data.daysDone;
    if(typeof data.weekOffset==='number') weekOffset=data.weekOffset;
    return true;
  }catch(e){return false;}
}
function storageAvailable(){

var daysDone={}; // key: 'YYYY-WW-D' → true

function dayKey(di){
  // Use weekOffset + day index as key so it persists correctly
  return 'w'+weekOffset+'-d'+di;
}
function toggleDone(di,e){
  e.stopPropagation();
  var k=dayKey(di);
  daysDone[k]=!daysDone[k];
  storeSave();
  rDTabs();
}

// ── ROTACIÓN SEMANAL AUTOMÁTICA ──────────────
// weekOffset se deriva de la semana del año actual — transparente al usuario
function currentWeekNumber(){
  var d=new Date();
  var onejan=new Date(d.getFullYear(),0,1);
  return Math.ceil((((d-onejan)/86400000)+onejan.getDay()+1)/7);
}
// weekOffset se guarda en storage para que no cambie si se abre la app en mitad de semana
// pero si ya cambió de semana, se auto-actualiza
function syncWeekOffset(){
  var wn=currentWeekNumber();
  if(typeof weekOffset!=='number' || weekOffset===0){
    weekOffset=wn;
    return true; // changed
  }
  if(weekOffset!==wn){
    weekOffset=wn;
    daysDone={};
    return true; // changed
  }
  return false;
}

function renderRecetario(){
  var el=document.getElementById('recetario-list');
  if(!el)return;
  var q=(document.getElementById('srec')||{value:''}).value.trim().toLowerCase();

  // Collect all meals from all pools, deduplicated by name
  var seen={};
  var all=[];
  ['desayuno','almuerzo','merienda','cena'].forEach(function(cat){
    POOLS[cat].forEach(function(m){
      if(seen[m.name])return;
      seen[m.name]=true;
      all.push(Object.assign({},m,{cat:cat}));
    });
  });

  // Filter by restriction pill
  if(activeRfilter){
    all=all.filter(function(m){return !!m[activeRfilter];});
  }

  // Filter by search text (name + detail + recipe ingredients)
  if(q){
    all=all.filter(function(m){
      var rec=REC[m.name];
      var hay=(m.name+' '+m.detail+(rec?' '+rec.i:'')).toLowerCase();
      return hay.indexOf(q)!==-1;
    });
  }

  if(!all.length){
    el.innerHTML='<div style="text-align:center;padding:2rem;font-size:13px;color:var(--text3);">Sin resultados para esa búsqueda.</div>';
    return;
  }

  var catLabel={desayuno:'Desayuno',almuerzo:'Almuerzo',merienda:'Merienda',cena:'Cena'};
  // Group by category for display
  var byCat={desayuno:[],almuerzo:[],merienda:[],cena:[]};
  all.forEach(function(m){byCat[m.cat].push(m);});

  var h='';
  ['desayuno','almuerzo','merienda','cena'].forEach(function(cat){
    if(!byCat[cat].length)return;
    h+='<div style="font-size:10px;font-family:monospace;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin:14px 0 6px;">'+catLabel[cat]+'</div>';
    byCat[cat].forEach(function(m,idx){
      var k='rc-'+cat+'-'+idx;
      var open=!!mO[k];
      var rec=REC[m.name];
      var flagTags='';
      if(m.vegan)flagTags+='<span class="tag tg" style="padding:1px 5px;font-size:9px;">vegano</span> ';
      else if(m.veg)flagTags+='<span class="tag tg" style="padding:1px 5px;font-size:9px;">veg</span> ';
      if(m.gf)flagTags+='<span class="tag tb" style="padding:1px 5px;font-size:9px;">sin TACC</span> ';
      if(m.lf)flagTags+='<span class="tag tb" style="padding:1px 5px;font-size:9px;">sin lactosa</span> ';
      if(m.keto)flagTags+='<span class="tag tp" style="padding:1px 5px;font-size:9px;">keto</span> ';
      h+='<div class="mc '+(open?'on':'')+'" id="'+k+'">';
      h+='<div class="mc-top" onclick="togRec(\''+k+'\')">';
      h+='<div class="mc-info"><div class="mc-name">'+m.name+'</div>';
      h+='<div style="margin-top:4px;">'+flagTags+'</div>';
      h+='<div class="mc-kcal">'+m.kcal+' kcal</div></div>';
      h+='<div class="mc-chev">▾</div></div>';
      if(open && rec){
        h+='<div class="mc-panel"><div class="pbody">';
        h+='<p class="rlbl">Ingredientes</p><p class="ringr">'+rec.i.replace(/\n/g,'<br>')+'</p>';
        h+='<p class="rlbl">Preparación</p><ol class="rsteps">'+rec.s.map(function(s){return'<li>'+s+'</li>';}).join('')+'</ol>';
        h+='</div></div>';
      } else if(open){
        h+='<div class="mc-panel"><div class="pbody"><p style="font-size:12px;color:var(--text3)">Receta no disponible.</p></div></div>';
      }
      h+='</div>';
    });
  });
  el.innerHTML=h;
}
